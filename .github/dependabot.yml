version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    # Disable routine version-update PRs; keep Dependabot security updates.
    open-pull-requests-limit: 0

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    # Disable routine version-update PRs; keep Dependabot security updates.
    open-pull-requests-limit: 0
